<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220">
  <!-- background -->
  <rect x="0" y="0" width="720" height="220" fill="#1c2129"/>

  <!-- connecting line -->
  <line x1="90" y1="110" x2="630" y2="110" stroke="#2c313c" stroke-width="2"/>

  <!-- Client -->
  <circle cx="60" cy="110" r="28" fill="#232936" stroke="#9384e0" stroke-width="2"/>
  <text x="60" y="115" fill="#e7e9ec" font-size="12" font-family="Consolas, monospace" text-anchor="middle">You</text>
  <text x="60" y="160" fill="#9aa1ac" font-size="11" font-family="Consolas, monospace" text-anchor="middle">client</text>

  <!-- Guard node -->
  <circle cx="230" cy="110" r="34" fill="#232936" stroke="#9384e0" stroke-width="2"/>
  <circle cx="230" cy="110" r="20" fill="none" stroke="#9384e0" stroke-width="1" opacity="0.6"/>
  <text x="230" y="115" fill="#e7e9ec" font-size="12" font-family="Consolas, monospace" text-anchor="middle">Guard</text>
  <text x="230" y="160" fill="#9aa1ac" font-size="11" font-family="Consolas, monospace" text-anchor="middle">knows your IP</text>

  <!-- Middle node -->
  <circle cx="390" cy="110" r="34" fill="#232936" stroke="#9384e0" stroke-width="2"/>
  <circle cx="390" cy="110" r="20" fill="none" stroke="#9384e0" stroke-width="1" opacity="0.6"/>
  <text x="390" y="115" fill="#e7e9ec" font-size="12" font-family="Consolas, monospace" text-anchor="middle">Middle</text>
  <text x="390" y="160" fill="#9aa1ac" font-size="11" font-family="Consolas, monospace" text-anchor="middle">isolates guard/exit</text>

  <!-- Exit node -->
  <circle cx="550" cy="110" r="34" fill="#232936" stroke="#9384e0" stroke-width="2"/>
  <circle cx="550" cy="110" r="20" fill="none" stroke="#9384e0" stroke-width="1" opacity="0.6"/>
  <text x="550" y="115" fill="#e7e9ec" font-size="12" font-family="Consolas, monospace" text-anchor="middle">Exit</text>
  <text x="550" y="160" fill="#9aa1ac" font-size="11" font-family="Consolas, monospace" text-anchor="middle">knows destination</text>

  <!-- Destination server -->
  <rect x="640" y="88" width="44" height="44" rx="4" fill="#232936" stroke="#9384e0" stroke-width="2"/>
  <text x="662" y="115" fill="#e7e9ec" font-size="11" font-family="Consolas, monospace" text-anchor="middle">Site</text>

  <text x="360" y="30" fill="#9aa1ac" font-size="13" font-family="Georgia, serif" text-anchor="middle">Three-hop telescoping circuit — no single relay knows both ends</text>
</svg>
